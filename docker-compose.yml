name: dropvault

# Local development infrastructure. The api/web apps run natively (pnpm dev) for fast
# hot-reload; this compose file only provides the backing services they talk to.
#   docker compose up -d                 → postgres, redis, minio, mailpit (+ bucket init)
#   docker compose --profile scan up -d  → also start ClamAV (memory-heavy; opt-in)

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dropvault
      POSTGRES_PASSWORD: dropvault
      POSTGRES_DB: dropvault
    ports:
      # Host 5433 → container 5432, to avoid clashing with a native Postgres on 5432.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropvault -d dropvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio-data:/data

  # One-shot: wait for MinIO, then create the local bucket.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 1; done &&
      mc mb --ignore-existing local/dropvault-local &&
      echo 'bucket dropvault-local ready'
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: 500

  # ClamAV is memory-heavy — only starts with: docker compose --profile scan up
  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    profiles: ["scan"]
    ports:
      - "3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clamav-data:
