name: CD

# Manual until production secrets are configured (DATABASE_URL, RENDER_DEPLOY_HOOK_*,
# VERCEL_*, PRODUCTION_API_URL). Run from the Actions tab → CD → "Run workflow".
# To re-enable auto-deploy, uncomment the `push` trigger below.
on:
  workflow_dispatch: {}
  # push:
  #   branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate database
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Backward-compatible (expand/contract) migrations, so the running app survives the window.
      - name: Apply migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  deploy-api:
    name: Deploy API + worker (Render)
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render API deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
      - name: Trigger Render worker deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"

  deploy-web:
    name: Deploy web (Vercel)
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel
        run: |
          pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"
          pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  smoke:
    name: Smoke test
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for API readiness
        run: |
          curl -fsS --retry 12 --retry-delay 10 --retry-all-errors \
            "${{ secrets.PRODUCTION_API_URL }}/health/ready"
